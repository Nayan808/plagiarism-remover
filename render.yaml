services:
  - type: web
    name: plagiarism-remover-api
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: |
      apt-get update && apt-get install -y libreoffice --no-install-recommends
      pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false          # You will paste this in Render dashboard
      - key: ALLOWED_ORIGINS
        sync: false          # Paste your Netlify URL here after deploying frontend
    healthCheckPath: /health
